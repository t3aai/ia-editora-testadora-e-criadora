<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}T3A Plataforma{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Criacao, Edicao e Teste T3A <span>| Ferramenta Interna</span></a>
        <div class="navbar-links">
            <a href="/">Clientes</a>
            <a href="/create">Criar Prompt</a>
            <a href="/clients/new">+ Novo Cliente</a>
            <a href="/logout">Sair</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Processando...</div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
